<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ title }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

  <style>
    body { font-family: "Inter", sans-serif; }
  </style>
</head>
<body class="h-full bg-[#F3F6F3] text-slate-900">
<div class="min-h-screen flex">

  {% include 'sidebar_admin.html' %}

  <main class="flex-1">
    <div class="max-w-3xl mx-auto px-6 py-8">
      <div class="bg-white rounded-2xl shadow border border-slate-200 p-8">
        <h1 class="text-2xl font-extrabold">{{ title }}</h1>
        <p class="text-sm text-slate-500 mt-1">Isi data varietas padi.</p>

        <form method="POST" action="{{ form_action }}" class="mt-6 space-y-5">
          <div>
            <label class="block text-sm font-bold mb-2">Nama Varietas</label>
            <input type="text" name="nama"
                   value="{{ varietas.nama if varietas else '' }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   required>
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Hari Penyemaian</label>
            <input type="number" name="hari_penyemaian"
                   value="{{ varietas.hari_penyemaian if varietas else 0 }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   min="0" required>
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Hari Penanaman</label>
            <input type="number" name="hari_penanaman"
                   value="{{ varietas.hari_penanaman if varietas else '' }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   min="0" required>
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Hari Pemupukan 1</label>
            <input type="number" name="hari_pemupukan_1"
                   value="{{ varietas.hari_pemupukan_1 if varietas and varietas.hari_pemupukan_1 is not none else '' }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   min="0">
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Hari Pemupukan 2</label>
            <input type="number" name="hari_pemupukan_2"
                   value="{{ varietas.hari_pemupukan_2 if varietas and varietas.hari_pemupukan_2 is not none else '' }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   min="0">
          </div>

          <div>
            <label class="block text-sm font-bold mb-2">Hari Panen</label>
            <input type="number" name="hari_panen"
                   value="{{ varietas.hari_panen if varietas else '' }}"
                   class="w-full rounded-xl border border-slate-300 px-4 py-3"
                   min="1" required>
          </div>

          <div class="flex gap-3 pt-2">
            <a href="{{ url_for('auth.varietas') }}"
               class="px-5 py-3 rounded-xl bg-slate-200 text-slate-700 font-bold">
              Kembali
            </a>
            <button type="submit"
                    class="px-5 py-3 rounded-xl bg-emerald-500 text-white font-bold hover:brightness-95">
              Simpan
            </button>
          </div>
        </form>
      </div>
    </div>
  </main>

</div>
</body>
</html>
